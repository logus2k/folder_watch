services:
  folder-watch-app:
    build:
      context: .
      dockerfile: Dockerfile
      # Canonical envelope + firing contract (fired_event/seed_of) from the shared
      # agent-bus-client SDK instead of a vendored copy (single source of truth).
      additional_contexts:
        busclient_sdk: ../agent_bus/sdk/python
    image: folder_watch:1.0
    container_name: folder-watch-app
    restart: unless-stopped
    environment:
      # Reach the bus by its service name on the shared network.
      VALKEY_HOST: valkey-bus
      # Use NATIVE inotify instead of watchfiles' polling fallback. watchfiles auto-forces
      # polling on ANY WSL kernel (it only checks for "microsoft-standard" in uname.release),
      # which costs ~250ms latency vs ~50ms for inotify. That fallback exists because inotify
      # is dead on Windows-backed /mnt/* (9p) mounts — measured: zero events. We watch LINUX
      # paths only (./watched is ext4), where inotify is verified working, so the fallback is
      # pure cost. NOTE: if a watched folder is ever moved onto /mnt/c, REMOVE this — it would
      # go silent. Also: under inotify an atomic replace reports "created" (not "modified").
      WATCHFILES_FORCE_POLLING: "false"
    volumes:
      # Mount the host folder(s) to watch; bindings reference container paths.
      - ./watched:/watched
      # Persist watch bindings (JSON) so they survive a restart — the host dir is the
      # source of truth; the store loads it at boot and writes on every CRUD.
      - ./data:/app/data
    ports:
      # Admin API, localhost-bound (nginx fronts external access).
      # Host port 6821 to avoid colliding with agent-runtime-app (6817).
      - "127.0.0.1:6821:6817"
    networks:
      - logus2k_network
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:6817/health'); sys.exit(0)"
      interval: 10s
      timeout: 5s
      retries: 5

# valkey-bus is owned by the agent_bus compose project; we only join the network.
networks:
  logus2k_network:
    external: true
